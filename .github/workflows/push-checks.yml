name: Push Checks

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches-ignore:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/CODEOWNERS'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  type-check:
    uses: ./.github/workflows/_reusable-type-check.yml

  lint:
    uses: ./.github/workflows/_reusable-lint.yml

  unit-tests:
    uses: ./.github/workflows/_reusable-unit-tests.yml

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            apps/functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install functions dependencies
        run: cd apps/functions && npm ci

      # audit-level=critical because xlsx and firebase-admin transitive deps
      # (node-forge, @tootallnate/once) have high-severity vulns with no fix available.
      - name: Audit frontend dependencies
        run: npm audit --omit=dev --audit-level=critical

      - name: Audit functions dependencies
        run: cd apps/functions && npm audit --omit=dev --audit-level=critical

  firestore-rules:
    uses: ./.github/workflows/_reusable-firestore-rules.yml

  push-gate:
    name: Push Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - type-check
      - lint
      - unit-tests
      - security-audit
      - firestore-rules
    steps:
      - name: Check all jobs passed
        run: |
          results=(
            "type-check=${{ needs.type-check.result }}"
            "lint=${{ needs.lint.result }}"
            "unit-tests=${{ needs.unit-tests.result }}"
            "security-audit=${{ needs.security-audit.result }}"
            "firestore-rules=${{ needs.firestore-rules.result }}"
          )

          failed=()
          for entry in "${results[@]}"; do
            job="${entry%%=*}"
            result="${entry##*=}"
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              failed+=("$job ($result)")
            fi
          done

          if [[ ${#failed[@]} -gt 0 ]]; then
            echo "✗ The following jobs failed:"
            for f in "${failed[@]}"; do
              echo "  - $f"
            done
            exit 1
          fi

          echo "✓ All checks passed"
