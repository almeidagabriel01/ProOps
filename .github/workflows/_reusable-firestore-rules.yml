name: Reusable — Firestore Rules Tests

on:
  workflow_call:

permissions:
  contents: read

jobs:
  firestore-rules:
    name: Firestore Rules Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            apps/functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Cache Firebase emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ hashFiles('firebase.json') }}
          restore-keys: firebase-emulators-

      - name: Run Firestore rules tests
        run: firebase emulators:exec --only firestore --project demo-proops-test "npm run test:rules"
        env:
          CI: true
