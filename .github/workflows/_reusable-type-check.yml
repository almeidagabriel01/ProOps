name: Reusable — Type Check

on:
  workflow_call:

permissions:
  contents: read

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            apps/functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install functions dependencies
        run: cd apps/functions && npm ci

      - name: Type check frontend
        run: cd apps/web && npx tsc --noEmit

      - name: Type check functions
        run: cd apps/functions && npx tsc --noEmit
